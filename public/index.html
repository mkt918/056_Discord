<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Antigravity | Remote Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">
    <div class="w-full max-w-2xl flex flex-col h-[90vh] glass rounded-[2.5rem] overflow-hidden">
        <!-- Header -->
        <header class="p-6 md:p-8 flex items-center justify-between border-b border-white/20">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-black rounded-2xl flex items-center justify-center">
                    <span class="text-white font-bold text-xl">AG</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Antigravity</h1>
                    <div class="flex items-center space-x-1.5">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Remote
                            Engine v2.0</span>
                    </div>
                </div>
            </div>
            <button id="settings-btn" class="p-2 hover:bg-black/5 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                </svg>
            </button>
        </header>

        <!-- Message List -->
        <main id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6 scroll-smooth">
            <div class="flex flex-col items-start max-w-[85%]">
                <div class="bg-white/40 p-5 rounded-3xl rounded-tl-none border border-white/60 shadow-sm">
                    <p class="text-sm leading-relaxed">Welcome back. あなた専用のターミナルを介して、ご指示をお待ちしています。何を実行しますか？</p>
                </div>
                <span class="text-[10px] text-slate-400 mt-2 ml-2 font-medium">ANTIGRAVITY · 12:01 AM</span>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="p-6 md:p-8 bg-white/30 backdrop-blur-md border-t border-white/20">
            <form id="command-form" class="relative group">
                <input type="text" id="command-input" placeholder="Type a command or prompt..."
                    class="w-full bg-white/60 border border-white/80 p-5 pr-16 rounded-3xl focus:outline-none focus:ring-4 focus:ring-black/5 transition-all shadow-inner text-sm md:text-base font-medium placeholder:text-slate-400"
                    autocomplete="off">
                <button type="submit"
                    class="absolute right-3 top-2 bottom-2 aspect-square bg-black text-white rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-lg hover:shadow-black/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
                            clip-rule="evenodd" />
                    </svg>
                </button>
            </form>
            <div
                class="flex justify-center mt-4 space-x-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <button type="button" class="hover:text-black transition-colors"
                    onclick="setInput('!gemini ')">Gemini</button>
                <button type="button" class="hover:text-black transition-colors"
                    onclick="setInput('!claude ')">Claude</button>
                <button type="button" class="hover:text-black transition-colors"
                    onclick="setInput('dir')">Files</button>
                <button type="button" class="hover:text-black transition-colors" id="status-toggle">System</button>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        function setInput(val) {
            const input = document.getElementById('command-input');
            input.value = val;
            input.focus();
        }
    </script>
</body>

</html>
